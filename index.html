<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <button id="theme-toggle" class="theme-toggle">&#9728; LIGHT</button>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section records-panel">
          <span class="label">RECORDS</span>
          <ul class="records-list">
            <li><span class="rec-label">Mejor puntuación</span><span class="rec-value" id="rec-best-score">0</span></li>
            <li><span class="rec-label">Máx. líneas</span><span class="rec-value" id="rec-best-lines">0</span></li>
            <li><span class="rec-label">Mejor combo</span><span class="rec-value" id="rec-best-combo">0</span></li>
          </ul>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <!-- Name entry (shown only on game over, before saving) -->
        <div id="overlay-name-section" class="hidden">
          <label class="hs-name-label" for="overlay-name-input">Tu nombre:</label>
          <div class="hs-name-row">
            <input id="overlay-name-input" class="hs-name-input" type="text" maxlength="16" placeholder="AAA" autocomplete="off" />
            <button id="overlay-save-btn" class="hs-save-btn">Guardar</button>
          </div>
        </div>

        <!-- High-scores table (shown after saving or on start screen) -->
        <div id="overlay-hs-table" class="hidden"></div>

        <!-- Start-screen play button -->
        <button id="start-play-btn" class="hidden">Jugar</button>

        <!-- Reset records button -->
        <button id="overlay-reset-btn" class="hs-reset-btn hidden">Resetear records</button>

        <!-- Restart button (shown after saving score) -->
        <button id="restart-btn" class="hidden">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
