<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <button id="theme-toggle" class="theme-toggle">&#9728; LIGHT</button>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <!-- Game Over overlay -->
    <div id="overlay" class="overlay hidden" data-state="gameover">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <!-- Pause overlay -->
    <div id="pause-overlay" class="overlay hidden" data-state="pause">
      <div class="overlay-box pause-box">
        <p class="pause-title">PAUSA</p>

        <button id="resume-btn" class="pause-btn pause-btn--primary">Reanudar</button>
        <button id="pause-restart-btn" class="pause-btn">Reiniciar</button>

        <button id="controls-toggle-btn" class="pause-btn pause-btn--secondary">Ver controles</button>
        <div id="controls-panel" class="controls-panel hidden">
          <ul class="controls-list">
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> / <kbd>X</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída rápida</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
        </div>

        <div class="start-level-section">
          <label for="start-level-select" class="label">NIVEL INICIAL</label>
          <select id="start-level-select" class="start-level-select"></select>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
